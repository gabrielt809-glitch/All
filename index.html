<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>All</title>
<style>
  /* ── TOKENS ─────────────────────────────────────────── */
  :root {
    --bg:        #0a0a0a;
    --surface:   #131313;
    --card:      #1a1a1a;
    --border:    rgba(255,255,255,0.07);
    --text:      #f0f0f0;
    --muted:     #555;
    --dim:       #888;

    /* accent per module */
    --tasks:     #7c6cff;
    --hydro:     #3ab4f2;
    --health:    #4ecb91;
    --finance:   #f0c040;
    --sleep:     #a97bff;

    --radius:    14px;
    --tab-h:     56px;
    --safe-b:    env(safe-area-inset-bottom, 0px);
  }

  /* ── RESET ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overflow: hidden; }

  /* ── LAYOUT ──────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
  }

  /* ── HEADER ──────────────────────────────────────────── */
  #header {
    padding: calc(env(safe-area-inset-top, 0px) + 18px) 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #header .wordmark {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  #header .wordmark span { color: var(--accent, var(--tasks)); }
  #header .date-label {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.3px;
  }

  /* ── PAGES ───────────────────────────────────────────── */
  #pages { flex: 1; overflow: hidden; position: relative; }
  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 4px 16px 20px;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .page.active { display: block; }

  /* ── SECTION TITLE ───────────────────────────────────── */
  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 18px 0 10px;
  }
  .section-head .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent, #fff);
    flex-shrink: 0;
  }
  .section-head h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* ── CARD ────────────────────────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 10px;
  }
  .card-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-label { font-size: 13px; color: var(--dim); margin-bottom: 4px; }
  .card-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .card-unit  { font-size: 13px; color: var(--dim); margin-left: 3px; }

  /* ── PROGRESS BAR ────────────────────────────────────── */
  .prog-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-top: 12px;
  }
  .prog-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent, #fff);
    transition: width .4s ease;
  }

  /* ── BUTTON ──────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: .7; }
  .btn-primary { background: var(--accent, var(--tasks)); color: #fff; width: 100%; margin-top: 10px; }
  .btn-ghost { background: transparent; color: var(--accent, #fff); border: 1px solid var(--border); }
  .btn-icon { background: var(--surface); color: var(--text); width: 38px; height: 38px; border-radius: 10px; padding: 0; font-size: 18px; }

  /* ── INPUT ───────────────────────────────────────────── */
  input[type=text], input[type=number], select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    padding: 11px 14px;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
  }
  input[type=text]:focus, input[type=number]:focus { border-color: var(--accent, var(--tasks)); }

  /* ── TASK ITEM ───────────────────────────────────────── */
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--muted);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    font-size: 11px;
  }
  .task-item.done .task-check {
    background: var(--tasks);
    border-color: var(--tasks);
    color: #fff;
  }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
  .task-text { font-size: 15px; flex: 1; }

  /* ── WATER BUTTONS ───────────────────────────────────── */
  .water-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .water-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--hydro);
    font-size: 14px;
    font-weight: 600;
    padding: 14px 8px;
    cursor: pointer;
    text-align: center;
    transition: background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .water-btn:active { background: rgba(58,180,242,0.15); }

  /* ── SLEEP CHART ─────────────────────────────────────── */
  .sleep-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 70px;
    margin-top: 12px;
  }
  .sleep-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .sleep-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: var(--sleep);
    opacity: .55;
    transition: height .4s ease, opacity .2s;
    min-height: 4px;
  }
  .sleep-bar.today { opacity: 1; }
  .sleep-bar-label { font-size: 10px; color: var(--muted); }

  /* ── FINANCE ─────────────────────────────────────────── */
  .fin-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .fin-row:last-child { border-bottom: none; }
  .fin-cat { font-size: 14px; }
  .fin-cat small { display: block; font-size: 11px; color: var(--dim); margin-top: 1px; }
  .fin-amount { font-size: 15px; font-weight: 600; }
  .fin-amount.neg { color: #f05a5a; }
  .fin-amount.pos { color: var(--health); }

  /* ── HEALTH RINGS ────────────────────────────────────── */
  .rings-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .ring-item {
    flex: 1;
    min-width: 90px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    text-align: center;
  }
  .ring-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    position: relative;
  }
  .ring-label { font-size: 11px; color: var(--dim); }

  /* ── TABBAR ──────────────────────────────────────────── */
  #tabbar {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-b);
    height: calc(var(--tab-h) + var(--safe-b));
  }
  .tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    padding-top: 8px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .15s;
    position: relative;
  }
  .tab:active { opacity: .6; }
  .tab svg { width: 22px; height: 22px; stroke: var(--muted); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke .2s; }
  .tab span { font-size: 10px; color: var(--muted); font-weight: 500; transition: color .2s; }
  .tab.active svg { stroke: var(--tab-color, var(--tasks)); }
  .tab.active span { color: var(--tab-color, var(--tasks)); }
  .tab.active::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 2px;
    border-radius: 0 0 3px 3px;
    background: var(--tab-color, var(--tasks));
  }

  /* ── ADD PANEL ───────────────────────────────────────── */
  .add-panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    display: none;
  }
  .add-panel.open { display: flex; }
  .add-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + var(--safe-b));
    width: 100%;
    border-top: 1px solid var(--border);
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 0 auto 18px;
  }
  .sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }

  /* ── EMPTY STATE ─────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  /* ── SCROLLBAR ───────────────────────────────────────── */
  .page::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="wordmark">all<span>.</span></div>
    <div class="date-label" id="headerDate"></div>
  </div>

  <!-- PAGES -->
  <div id="pages">

    <!-- TASKS -->
    <div class="page active" id="page-tasks" style="--accent: var(--tasks)">
      <div class="section-head"><div class="dot"></div><h2>Tarefas</h2></div>
      <div id="tasks-list"></div>
      <button class="btn btn-primary" onclick="openPanel('tasks')">+ Nova tarefa</button>
    </div>

    <!-- HYDRATION -->
    <div class="page" id="page-hydro" style="--accent: var(--hydro)">
      <div class="section-head"><div class="dot"></div><h2>Hidratação</h2></div>
      <div class="card">
        <div class="card-label">Hoje</div>
        <div class="card-row">
          <div><span class="card-value" id="water-val">0</span><span class="card-unit">ml</span></div>
          <span style="font-size:13px;color:var(--dim)" id="water-pct">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="water-bar" style="width:0%"></div></div>
      </div>
      <div class="water-grid">
        <button class="water-btn" onclick="addWater(150)">+150ml</button>
        <button class="water-btn" onclick="addWater(200)">+200ml</button>
        <button class="water-btn" onclick="addWater(300)">+300ml</button>
        <button class="water-btn" onclick="addWater(350)">+350ml</button>
        <button class="water-btn" onclick="addWater(500)">+500ml</button>
        <button class="water-btn" onclick="resetWater()">↺ Reset</button>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="card-label">Meta diária</div>
        <div class="card-row">
          <span class="card-value" style="font-size:18px" id="water-goal-display">2500 ml</span>
          <button class="btn btn-ghost" style="padding:7px 14px;font-size:13px" onclick="openPanel('water-goal')">Editar</button>
        </div>
      </div>
    </div>

    <!-- HEALTH -->
    <div class="page" id="page-health" style="--accent: var(--health)">
      <div class="section-head"><div class="dot"></div><h2>Saúde</h2></div>
      <div class="rings-row" id="health-rings"></div>
      <div class="section-head" style="margin-top:18px"><div class="dot"></div><h2>Registros</h2></div>
      <div id="health-log"></div>
      <button class="btn btn-primary" onclick="openPanel('health')">+ Registrar</button>
    </div>

    <!-- FINANCE -->
    <div class="page" id="page-finance" style="--accent: var(--finance)">
      <div class="section-head"><div class="dot"></div><h2>Finanças</h2></div>
      <div class="card">
        <div class="card-label">Saldo do mês</div>
        <div class="card-value" id="balance-val" style="color:var(--health)">R$ 0,00</div>
      </div>
      <div class="card" style="margin-top:0">
        <div id="finance-list"><div class="empty"><div class="empty-icon">💸</div>Nenhum lançamento ainda.</div></div>
      </div>
      <button class="btn btn-primary" onclick="openPanel('finance')">+ Lançamento</button>
    </div>

    <!-- SLEEP -->
    <div class="page" id="page-sleep" style="--accent: var(--sleep)">
      <div class="section-head"><div class="dot"></div><h2>Sono</h2></div>
      <div class="card">
        <div class="card-label">Última noite</div>
        <div class="card-row">
          <div><span class="card-value" id="sleep-val">—</span><span class="card-unit">h</span></div>
          <span style="font-size:13px;color:var(--dim)" id="sleep-quality-badge"></span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="sleep-bar" style="width:0%"></div></div>
      </div>
      <div class="section-head"><div class="dot"></div><h2>Semana</h2></div>
      <div class="card">
        <div class="sleep-bars" id="sleep-chart"></div>
      </div>
      <button class="btn btn-primary" onclick="openPanel('sleep')">+ Registrar sono</button>
    </div>

  </div><!-- /pages -->

  <!-- TABBAR -->
  <div id="tabbar">
    <div class="tab active" onclick="switchTab('tasks')" style="--tab-color: var(--tasks)">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Tarefas</span>
    </div>
    <div class="tab" onclick="switchTab('hydro')" style="--tab-color: var(--hydro)">
      <svg viewBox="0 0 24 24"><path d="M12 2C6 10 4 14 4 16a8 8 0 0016 0c0-2-2-6-8-14z"/></svg>
      <span>Água</span>
    </div>
    <div class="tab" onclick="switchTab('health')" style="--tab-color: var(--health)">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span>Saúde</span>
    </div>
    <div class="tab" onclick="switchTab('finance')" style="--tab-color: var(--finance)">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <span>Finanças</span>
    </div>
    <div class="tab" onclick="switchTab('sleep')" style="--tab-color: var(--sleep)">
      <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <span>Sono</span>
    </div>
  </div>

</div><!-- /app -->

<!-- ── ADD PANELS ─────────────────────────────────────────── -->

<!-- Tasks panel -->
<div class="add-panel" id="panel-tasks" onclick="closePanel(event,'tasks')">
  <div class="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nova tarefa</div>
    <input type="text" id="task-input" placeholder="Descreva a tarefa…">
    <button class="btn btn-primary" style="--accent:var(--tasks);background:var(--tasks)" onclick="addTask()">Adicionar</button>
  </div>
</div>

<!-- Water goal panel -->
<div class="add-panel" id="panel-water-goal" onclick="closePanel(event,'water-goal')">
  <div class="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Meta de água</div>
    <input type="number" id="goal-input" placeholder="Ex: 2500" value="">
    <button class="btn btn-primary" style="--accent:var(--hydro);background:var(--hydro)" onclick="saveWaterGoal()">Salvar</button>
  </div>
</div>

<!-- Health panel -->
<div class="add-panel" id="panel-health" onclick="closePanel(event,'health')">
  <div class="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Registrar dado</div>
    <select id="health-type" style="margin-bottom:10px">
      <option value="weight">Peso (kg)</option>
      <option value="steps">Passos</option>
      <option value="pressure">Pressão (ex: 120/80)</option>
      <option value="glucose">Glicose (mg/dL)</option>
    </select>
    <input type="text" id="health-val-input" placeholder="Valor">
    <button class="btn btn-primary" style="--accent:var(--health);background:var(--health)" onclick="addHealthLog()">Registrar</button>
  </div>
</div>

<!-- Finance panel -->
<div class="add-panel" id="panel-finance" onclick="closePanel(event,'finance')">
  <div class="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Novo lançamento</div>
    <select id="fin-type" style="margin-bottom:10px">
      <option value="income">Receita</option>
      <option value="expense">Despesa</option>
    </select>
    <input type="text" id="fin-desc" placeholder="Descrição" style="margin-bottom:10px">
    <input type="number" id="fin-amount" placeholder="Valor (R$)">
    <button class="btn btn-primary" style="--accent:var(--finance);background:var(--finance)" onclick="addFinance()">Adicionar</button>
  </div>
</div>

<!-- Sleep panel -->
<div class="add-panel" id="panel-sleep" onclick="closePanel(event,'sleep')">
  <div class="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Registrar sono</div>
    <input type="number" id="sleep-hours" placeholder="Horas dormidas (ex: 7.5)" step="0.5" min="0" max="24" style="margin-bottom:10px">
    <select id="sleep-quality">
      <option value="Ótima">Qualidade ótima 😴</option>
      <option value="Boa">Qualidade boa 🙂</option>
      <option value="Regular">Qualidade regular 😐</option>
      <option value="Ruim">Qualidade ruim 😓</option>
    </select>
    <button class="btn btn-primary" style="--accent:var(--sleep);background:var(--sleep)" onclick="addSleep()">Registrar</button>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
const S = {
  tasks:   JSON.parse(localStorage.getItem('all_tasks')   || '[]'),
  water:   parseInt(localStorage.getItem('all_water')     || '0'),
  wGoal:   parseInt(localStorage.getItem('all_wgoal')     || '2500'),
  health:  JSON.parse(localStorage.getItem('all_health')  || '[]'),
  finance: JSON.parse(localStorage.getItem('all_finance') || '[]'),
  sleep:   JSON.parse(localStorage.getItem('all_sleep')   || '[]'),
};
const save = k => localStorage.setItem('all_'+k, JSON.stringify(S[k]));
const saveNum = (k,v) => { S[k]=v; localStorage.setItem('all_'+k,v); };

// ── DATE HEADER ────────────────────────────────────────────
(()=>{
  const d = new Date();
  const opts = { weekday:'short', day:'numeric', month:'short' };
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('pt-BR', opts).replace('.','');
})();

// ── TAB SWITCH ─────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${id}"]`).classList.add('active');
  document.getElementById('page-'+id).classList.add('active');
  if(id==='health') renderHealth();
  if(id==='sleep')  renderSleep();
  if(id==='finance')renderFinance();
}

// ── PANELS ─────────────────────────────────────────────────
function openPanel(id) {
  document.getElementById('panel-'+id).classList.add('open');
}
function closePanel(e, id) {
  if(e.target === document.getElementById('panel-'+id))
    document.getElementById('panel-'+id).classList.remove('open');
}
function closeAnyPanel(id) {
  document.getElementById('panel-'+id).classList.remove('open');
}

// ── TASKS ──────────────────────────────────────────────────
function renderTasks() {
  const el = document.getElementById('tasks-list');
  if(!S.tasks.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✅</div>Sem tarefas. Adicione uma!</div>';
    return;
  }
  el.innerHTML = S.tasks.map((t,i)=>`
    <div class="task-item ${t.done?'done':''}" onclick="toggleTask(${i})">
      <div class="task-check">${t.done?'✓':''}</div>
      <span class="task-text">${t.text}</span>
      <button class="btn-icon" style="background:transparent;color:var(--muted);font-size:16px;width:28px;height:28px;border:none;cursor:pointer"
        onclick="event.stopPropagation();deleteTask(${i})">×</button>
    </div>`).join('');
}
function addTask() {
  const v = document.getElementById('task-input').value.trim();
  if(!v) return;
  S.tasks.unshift({ text:v, done:false });
  save('tasks');
  document.getElementById('task-input').value = '';
  closeAnyPanel('tasks');
  renderTasks();
}
function toggleTask(i) { S.tasks[i].done = !S.tasks[i].done; save('tasks'); renderTasks(); }
function deleteTask(i) { S.tasks.splice(i,1); save('tasks'); renderTasks(); }

// ── WATER ──────────────────────────────────────────────────
function renderWater() {
  const pct = Math.min(100, Math.round(S.water / S.wGoal * 100));
  document.getElementById('water-val').textContent = S.water;
  document.getElementById('water-pct').textContent = pct + '%';
  document.getElementById('water-bar').style.width = pct + '%';
  document.getElementById('water-goal-display').textContent = S.wGoal + ' ml';
  document.getElementById('goal-input').value = S.wGoal;
}
function addWater(ml) {
  saveNum('water', S.water + ml);
  renderWater();
  if(window.navigator.vibrate) navigator.vibrate(30);
}
function resetWater() { saveNum('water', 0); renderWater(); }
function saveWaterGoal() {
  const v = parseInt(document.getElementById('goal-input').value);
  if(v > 0) saveNum('wgoal', v);
  closeAnyPanel('water-goal');
  renderWater();
}

// ── HEALTH ─────────────────────────────────────────────────
const healthLabels = { weight:'Peso', steps:'Passos', pressure:'Pressão', glucose:'Glicose' };
const healthColors = { weight:'#f0c040', steps:'#4ecb91', pressure:'#f05a5a', glucose:'#a97bff' };

function renderHealth() {
  // Last values
  const latest = {};
  S.health.forEach(e => { latest[e.type] = e.val; });
  const rings = document.getElementById('health-rings');
  rings.innerHTML = Object.entries(healthLabels).map(([k,l])=>`
    <div class="ring-item">
      <div class="ring-circle" style="background:${healthColors[k]}22;border:2px solid ${healthColors[k]}">
        <span style="color:${healthColors[k]};font-size:12px">${latest[k]||'—'}</span>
      </div>
      <div class="ring-label">${l}</div>
    </div>`).join('');

  const log = document.getElementById('health-log');
  if(!S.health.length) {
    log.innerHTML = '<div class="empty"><div class="empty-icon">🩺</div>Nenhum registro ainda.</div>'; return;
  }
  log.innerHTML = [...S.health].reverse().slice(0,8).map(e=>`
    <div class="card" style="padding:12px 16px">
      <div class="card-row">
        <span style="font-size:14px;color:${healthColors[e.type]}">${healthLabels[e.type]}</span>
        <span style="font-size:15px;font-weight:600">${e.val}</span>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:3px">${e.date}</div>
    </div>`).join('');
}
function addHealthLog() {
  const type = document.getElementById('health-type').value;
  const val  = document.getElementById('health-val-input').value.trim();
  if(!val) return;
  S.health.push({ type, val, date: new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) });
  save('health');
  document.getElementById('health-val-input').value = '';
  closeAnyPanel('health');
  renderHealth();
}

// ── FINANCE ────────────────────────────────────────────────
function renderFinance() {
  const list = document.getElementById('finance-list');
  const balance = S.finance.reduce((a,e)=> e.type==='income' ? a+e.amount : a-e.amount, 0);
  const bEl = document.getElementById('balance-val');
  bEl.textContent = 'R$ ' + Math.abs(balance).toFixed(2).replace('.',',');
  bEl.style.color = balance >= 0 ? 'var(--health)' : '#f05a5a';

  if(!S.finance.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">💸</div>Nenhum lançamento ainda.</div>'; return;
  }
  list.innerHTML = [...S.finance].reverse().map(e=>`
    <div class="fin-row">
      <div class="fin-cat">${e.desc}<small>${e.date}</small></div>
      <div class="fin-amount ${e.type==='income'?'pos':'neg'}">${e.type==='income'?'+':'-'}R$ ${e.amount.toFixed(2).replace('.',',')}</div>
    </div>`).join('');
}
function addFinance() {
  const type   = document.getElementById('fin-type').value;
  const desc   = document.getElementById('fin-desc').value.trim() || 'Sem descrição';
  const amount = parseFloat(document.getElementById('fin-amount').value);
  if(!amount || amount<=0) return;
  S.finance.push({ type, desc, amount, date: new Date().toLocaleDateString('pt-BR') });
  save('finance');
  document.getElementById('fin-desc').value = '';
  document.getElementById('fin-amount').value = '';
  closeAnyPanel('finance');
  renderFinance();
}

// ── SLEEP ──────────────────────────────────────────────────
const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function renderSleep() {
  const last = S.sleep[S.sleep.length-1];
  if(last) {
    document.getElementById('sleep-val').textContent = last.hours;
    document.getElementById('sleep-quality-badge').textContent = last.quality;
    const pct = Math.min(100, Math.round(last.hours / 9 * 100));
    document.getElementById('sleep-bar').style.width = pct + '%';
  }
  // Week chart (last 7 entries)
  const chart = document.getElementById('sleep-chart');
  const entries = S.sleep.slice(-7);
  const maxH = Math.max(...entries.map(e=>e.hours), 8);
  chart.innerHTML = entries.map((e,i)=>`
    <div class="sleep-bar-wrap">
      <div class="sleep-bar ${i===entries.length-1?'today':''}"
           style="height:${Math.round(e.hours/maxH*60)}px"></div>
      <div class="sleep-bar-label">${e.day}</div>
    </div>`).join('');
  if(!entries.length) chart.innerHTML = '<div style="color:var(--muted);font-size:13px;width:100%;text-align:center">Sem dados</div>';
}
function addSleep() {
  const hours   = parseFloat(document.getElementById('sleep-hours').value);
  const quality = document.getElementById('sleep-quality').value;
  if(!hours || hours<=0) return;
  const d = new Date();
  S.sleep.push({ hours, quality, day: days[d.getDay()], date: d.toLocaleDateString('pt-BR') });
  save('sleep');
  document.getElementById('sleep-hours').value = '';
  closeAnyPanel('sleep');
  renderSleep();
}

// ── KEYBOARD ENTER ─────────────────────────────────────────
document.getElementById('task-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

// ── INIT ───────────────────────────────────────────────────
renderTasks();
renderWater();
</script>
</body>
</html>
