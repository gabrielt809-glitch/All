<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ProdHub</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProdHub">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3233/3233100.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex flex-col">

    <div class="fixed top-12 right-4 text-xs font-bold text-emerald-400 bg-slate-800 border border-emerald-500 px-3 py-1 rounded-full z-50 shadow-lg">
      v5.0
    </div>

    <div id="auth-screen" class="flex-1 flex flex-col justify-center px-6 max-w-sm mx-auto w-full">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-extrabold text-indigo-400 tracking-tight">ProdHub</h1>
        <p class="mt-2 text-sm text-slate-400">Seu ecossistema de produtividade</p>
      </div>

      <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
        <h2 id="auth-title" class="text-xl font-bold mb-6 text-center text-white">Entrar na sua Conta</h2>

        <form id="auth-form" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">E-mail</label>
            <input type="email" id="email" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500" placeholder="seu@email.com">
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Senha</label>
            <input type="password" id="password" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500" placeholder="••••••••">
          </div>

          <button type="submit" id="btn-submit" class="w-full bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white font-bold py-3 rounded-xl mt-4 transition-colors">
            Entrar
          </button>
        </form>

        <div class="mt-6 border-t border-slate-700 pt-4">
          <button type="button" id="btn-toggle-auth" class="w-full py-3 text-sm text-indigo-400 font-bold active:text-indigo-300 rounded-lg">
            Não tem conta? Cadastre-se
          </button>
        </div>
      </div>
    </div>

    <div id="app-screen" class="hidden flex-1 flex flex-col p-6 max-w-md mx-auto w-full mt-12">
      <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
        <h2 class="text-lg font-bold text-white" id="user-display">Usuário</h2>
        <button id="btn-logout" class="bg-slate-800 active:bg-slate-700 text-slate-300 px-4 py-2 rounded-xl text-sm border border-slate-700">Sair</button>
      </header>
      <div class="bg-indigo-600/10 border border-indigo-500/20 p-6 rounded-2xl text-center">
        <h3 class="text-xl text-indigo-400 font-bold mb-2">Conectado! ⚡</h3>
        <p class="text-sm text-slate-400">Banco de dados ativo.</p>
      </div>
    </div>

    <script>
      // 1. ISOLAMENTO DA INTERFACE (Apenas Javascript Nativo)
      const btnToggle = document.getElementById('btn-toggle-auth');
      const authTitle = document.getElementById('auth-title');
      const btnSubmit = document.getElementById('btn-submit');
      const authForm = document.getElementById('auth-form');
      const btnLogout = document.getElementById('btn-logout');

      let isLoginMode = true;

      // Evento de clique simplificado ao máximo
      btnToggle.addEventListener('click', function(e) {
        e.preventDefault();
        isLoginMode = !isLoginMode;

        if (isLoginMode) {
          authTitle.innerText = 'Entrar na sua Conta';
          btnSubmit.innerText = 'Entrar';
          btnToggle.innerText = 'Não tem conta? Cadastre-se';
        } else {
          authTitle.innerText = 'Criar Nova Conta';
          btnSubmit.innerText = 'Cadastrar';
          btnToggle.innerText = 'Já tem conta? Faça Login';
        }
      });

      // 2. LÓGICA DO BANCO DE DADOS (SUPABASE)
      const SUPABASE_URL = "https://uxblzuaivfcqqqmctbbo.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4Ymx6dWFpdmZjcXFxbWN0YmJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDg4MzUsImV4cCI6MjA5NjYyNDgzNX0.kHYLy4sadofWHScwm8r0SdNyRh4__9m3Je5llUlg0Kc";
      
      let supabase = null;
      if (window.supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }

      authForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!supabase) return alert('Banco de dados carregando...');

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btnSubmit.disabled = true;
        btnSubmit.innerText = 'Processando...';

        try {
          if (isLoginMode) {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
          } else {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            alert('Conta criada com sucesso! Agora é só fazer login.');
            btnToggle.click(); // Volta pro login automaticamente
          }
          checkUser();
        } catch (error) {
          alert('Erro: ' + error.message);
        } finally {
          btnSubmit.disabled = false;
          btnSubmit.innerText = isLoginMode ? 'Entrar' : 'Cadastrar';
        }
      });

      btnLogout.addEventListener('click', async function() {
        if (supabase) await supabase.auth.signOut();
        checkUser();
      });

      async function checkUser() {
        if (!supabase) return;
        const { data } = await supabase.auth.getUser();

        if (data && data.user) {
          document.getElementById('auth-screen').classList.add('hidden');
          document.getElementById('app-screen').classList.remove('hidden');
          document.getElementById('user-display').innerText = data.user.email;
        } else {
          document.getElementById('auth-screen').classList.remove('hidden');
          document.getElementById('app-screen').classList.add('hidden');
        }
      }

      setTimeout(checkUser, 300);
    </script>
  </body>
</html>
